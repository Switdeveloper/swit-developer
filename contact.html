<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Swit Developer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif']
          },
          colors: {
            brand: {
              dark: '#0a0a0f',
              cyan: '#00d4ff',
              purple: '#7c3aed'
            }
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: white; }
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    .gradient-text { background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-primary { background: linear-gradient(135deg, #00d4ff, #7c3aed); position: relative; overflow: hidden; transition: all 0.3s ease; }
    .btn-primary::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent); transition: left 0.5s ease; }
    .btn-primary:hover::before { left: 100%; }
    .reveal { opacity: 0; transform: translateY(50px); }
    .form-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 16px; color: white; transition: all 0.3s ease; }
    .form-input:focus { border-color: #00d4ff; outline: none; box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
  </style>
</head>
<body>
  <nav class="fixed top-0 left-0 right-0 z-50 bg-brand-dark/90 backdrop-blur-xl border-b border-white/10">
    <div class="max-w-7xl mx-auto px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        <a href="index.html" class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-400 to-purple-600 flex items-center justify-center"><span class="text-white font-bold text-xl">S</span></div>
          <span class="font-display font-bold text-xl">Swit Developer</span>
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="services.html" class="text-white/70 hover:text-cyan-400 transition-colors">Services</a>
          <a href="about.html" class="text-white/70 hover:text-cyan-400 transition-colors">About</a>
          <a href="contact.html" class="text-cyan-400 font-medium">Contact</a>
          <a href="contact.html" class="btn-primary px-6 py-2.5 rounded-full text-white font-semibold text-sm">Get Quote</a>
        </div>
      </div>
    </div>
  </nav>

  <section class="pt-32 pb-20">
    <div class="max-w-7xl mx-auto px-6 lg:px-8">
      <div class="text-center mb-16">
        <span class="text-cyan-400 font-semibold uppercase tracking-widest text-sm reveal">Get In Touch</span>
        <h1 class="font-display text-5xl md:text-6xl font-bold mt-4 mb-6 reveal">Let's Start Your <span class="gradient-text">Project</span></h1>
        <p class="text-xl text-white/70 max-w-2xl mx-auto reveal">Ready to transform your digital presence? Get a free consultation and quote.</p>
      </div>

      <div class="grid lg:grid-cols-3 gap-12 max-w-6xl mx-auto">
        <div class="space-y-8">
          <div class="bg-white/5 border border-white/10 rounded-2xl p-6 reveal">
            <div class="w-12 h-12 bg-cyan-400/20 rounded-xl flex items-center justify-center mb-4">
              <i class="fas fa-envelope text-2xl text-cyan-400"></i>
            </div>
            <h3 class="font-semibold mb-2">Email</h3>
            <p class="text-white/60">hello@switdeveloper.com</p>
          </div>
          <div class="bg-white/5 border border-white/10 rounded-2xl p-6 reveal">
            <div class="w-12 h-12 bg-purple-400/20 rounded-xl flex items-center justify-center mb-4">
              <i class="fas fa-phone text-2xl text-purple-400"></i>
            </div>
            <h3 class="font-semibold mb-2">Phone</h3>
            <p class="text-white/60">+1 (555) 123-4567</p>
          </div>
          <div class="bg-white/5 border border-white/10 rounded-2xl p-6 reveal">
            <div class="w-12 h-12 bg-green-400/20 rounded-xl flex items-center justify-center mb-4">
              <i class="fas fa-clock text-2xl text-green-400"></i>
            </div>
            <h3 class="font-semibold mb-2">Response Time</h3>
            <p class="text-white/60">Within 24 hours</p>
          </div>
        </div>

        <div class="lg:col-span-2">
          <form class="bg-white/5 border border-white/10 rounded-2xl p-8 reveal" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
              <div>
                <label class="block text-white/80 mb-2">Name</label>
                <input type="text" name="name" required class="form-input w-full" placeholder="Your name">
              </div>
              <div>
                <label class="block text-white/80 mb-2">Email</label>
                <input type="email" name="email" required class="form-input w-full" placeholder="your@email.com">
              </div>
            </div>
            <div class="mb-6">
              <label class="block text-white/80 mb-2">Service</label>
              <select name="service" class="form-input w-full">
                <option value="">Select a service</option>
                <option value="shopify">Shopify Development</option>
                <option value="wordpress">WordPress Development</option>
                <option value="web-solutions">Web Solutions</option>
                <option value="ai-automation">AI Automation</option>
                <option value="marketing">Digital Marketing</option>
              </select>
            </div>
            <div class="mb-6">
              <label class="block text-white/80 mb-2">Message</label>
              <textarea name="message" rows="5" required class="form-input w-full resize-none" placeholder="Tell us about your project..."></textarea>
            </div>
            <button type="submit" class="btn-primary w-full py-4 rounded-full text-white font-semibold">
              Send Message <i class="fas fa-paper-plane ml-2"></i>
            </button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <footer class="bg-[#050508] border-t border-white/10">
    <div class="max-w-7xl mx-auto px-6 lg:px-8 py-8">
      <div class="flex justify-between items-center">
        <span class="font-display font-bold">Swit Developer</span>
        <p class="text-white/40 text-sm">&copy; 2024</p>
      </div>
    </div>
  </footer>

  <script>
    gsap.registerPlugin(ScrollTrigger);
    gsap.utils.toArray('.reveal').forEach((elem, i) => {
      gsap.from(elem, { scrollTrigger: { trigger: elem, start: "top 85%" }, y: 50, opacity: 0, duration: 0.8, delay: i * 0.1, ease: "power3.out" });
    });
  </script>
</body>
</html>
